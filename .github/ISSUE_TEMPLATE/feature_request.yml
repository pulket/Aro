name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should Aro handle better?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen in the app?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Finder context
        - Command generation
        - Command safety
        - Settings
        - Local models
        - UI/UX
        - Packaging/release
        - Other
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Could this make Aro run broader or riskier commands?
